<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)" rx="12" />
  <g opacity="0.08" stroke="#38bdf8" stroke-width="2" fill="none">
    
    <circle cx="200" cy="140" r="40" />
    <line x1="200" y1="140" x2="380" y2="180" />
    
    <circle cx="380" cy="180" r="48" />
    <line x1="380" y1="180" x2="560" y2="140" />
    
    <circle cx="560" cy="140" r="56" />
    <line x1="560" y1="140" x2="740" y2="180" />
    
    <circle cx="740" cy="180" r="64" />
    <line x1="740" y1="180" x2="920" y2="140" />
    
    <circle cx="920" cy="140" r="72" />
    <line x1="920" y1="140" x2="1100" y2="180" />
    
    <circle cx="1100" cy="180" r="80" />
    <line x1="1100" y1="180" x2="1280" y2="140" />
    
  </g>
  <text x="640" y="140" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="72" font-weight="800" fill="url(#accent)" text-anchor="middle" filter="url(#glow)">pypass</text>
  <text x="640" y="205" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">Self-service password change utility for Active Directory</text>
